<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Sport Cafe - Menú</title>
    <link rel="icon" type="image/x-icon" href="favicon1.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        header {
            background-color: #8B4513;
            color: white;
            text-align: center;
            padding: 1.5rem 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            margin-bottom: 0.5rem;
        }
        
        .container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .menu-categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
            gap: 10px;
        }
        
        .category-btn {
            background-color: #A0522D;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .category-btn:hover,
        .category-btn.active {
            background-color: #8B4513;
            transform: translateY(-2px);
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }
        
        .menu-item {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .menu-item:hover {
            transform: translateY(-5px);
        }
        
        .item-image {
            height: 200px;
            background-color: #f0f0f0;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .item-info {
            padding: 1.5rem;
        }
        
        .item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        
        .item-name {
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .item-price {
            color: #A0522D;
            font-weight: bold;
        }
        
        .item-desc {
            color: #666;
            margin-bottom: 1rem;
        }
        
        .search-container {
            margin: 1rem 0 2rem;
            text-align: center;
        }
        
        #search {
            padding: 0.5rem 1rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 1rem;
        }
        
        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #8B4513;
            color: white;
            margin-top: 2rem;
        }
        
        .category-title {
            grid-column: 1 / -1;
            font-size: 1.5rem;
            margin: 2rem 0 1rem;
            color: #8B4513;
            border-bottom: 2px solid #A0522D;
            padding-bottom: 0.5rem;
        }
        
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ff4757;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Monaco Sport Cafe</h1>
        <p>Deliciosos productos para disfrutar en cualquier momento</p>
    </header>

    <div class="container">
        <div class="search-container">
            <input type="text" id="search" placeholder="Buscar producto...">
        </div>

        <div class="menu-categories">
            <button class="category-btn active" data-category="all">Todos</button>
            <button class="category-btn" data-category="bebidas-frias">Bebidas Frías</button>
            <button class="category-btn" data-category="bebidas-calientes">Bebidas Calientes</button>
            <button class="category-btn" data-category="comida">Comida</button>
            <button class="category-btn" data-category="postres">Postres</button>
        </div>

        <div class="menu-grid" id="menu-container">
            <!-- Los productos se cargarán aquí con JavaScript -->
        </div>
    </div>

    <footer>
        <p>&copy; 2023 Monaco Sport Cafe. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Datos de los productos organizados por categorías
        const productos = [
            // Bebidas Frías
            {

                image: "icedcapuccino.jpg"
            }, {

                price: "$150",

                category: "bebidas-frias",

                badge: "FAVORITO"
            }, {
                name: "Lemon Tea Fresco",
                price: "$75",
                description: "Té negro infusionado con limón fresco y un toque de miel, servido sobre hielo.",
                category: "bebidas-frias",
                image: "lemontea.jpg"
            }, {
                name: "Café Helado Cremoso",
                price: "$195",
                description: "Café helado cremoso, una bebida refrescante con el intenso sabor del café y una textura suave y espumosa.",

                badge: "FAVORITO"
            }, {
                name: "Caramel Crunch Freakshake",
                price: "$395",
                description: "Un batido monstruoso cargado de helado, caramelo derretido y crujientes trozos de galleta.",
                category: "bebidas-frias",
                image: "Caramel Crunch Freakshakes.jpg",
                badge: "FAVORITO"
            }, {
                name: "Strawberry Shake",
                price: "$100",
                description: "Un clásico batido de fresa, cremoso y refrescante, hecho con fruta natural y leche suave.",
                category: "bebidas-frias",
                image: "Strawberry shake.jpg",
                badge: "FAVORITO"
            }, {
                name: "Banana Split Milkshake",
                price: "$95",
                description: "Un batido inspirado en el postre clásico, con plátano, chocolate, fresa y un toque de crema batida.",
                category: "bebidas-frias",
                image: "Banana Split Milkshakes.jpg",
                badge: "FAVORITO"
            }, {
                name: "Smoothie de Mango y Piña",
                price: "$85",
                description: "El smoothie de mango y piña es una bebida tropical, cremosa y refrescante, hecha con frutas naturales.",
                category: "bebidas-frias",
                image: "Smoothie de Mango y Piña.jpeg"
            }, {
                name: "Frappuccino de Cookies y Cream",
                price: "$125",
                description: "Frappuccino con cookies and cream, una mezcla helada y cremosa con trozos de galleta que se derriten en cada sorbo.",
                category: "bebidas-frias",
                image: "Frappuccino de Cookies y Cream.jpeg"
            }, {
                name: "Batido Bicolor Vainilla-Fresa",
                price: "$145",
                description: "Batido bicolor de vainilla y fresa, una combinación deliciosa y visualmente atractiva de dos sabores clásicos.",
                category: "bebidas-frias",
                image: "Batidos bicolor de vainilla y fresa.jpeg"
            },

            // Bebidas Calientes
            {
                name: "Cappuccino Italiano",
                price: "$150",
                description: "Auténtico cappuccino preparado con espresso arábica y leche vaporizada con una suave capa de espuma.",
                category: "bebidas-calientes",

            }, {

            }, {

                price: "$150",
                description: "Deliciosa combinación de espresso, leche vaporizada y chocolate belga, coronado con crema batida.",
                category: "bebidas-calientes",
                image: "mochaccino.jpg"
            }, {
                name: "Mochiano",
                price: "$50",
                description: "Nuestra versión mini del mochaccino, perfecto para un rápido impulso de energía.",
                category: "bebidas-calientes",
                image: "mochiano.jpg"
            }, {

                price: "$150",
                description: "Exquisita combinación de espresso, leche al vapor y jarabe de chocolate artesanal.",
                category: "bebidas-calientes",

            }, {

            // Comida
            {

            }, {

            }, {

            },

            // Postres
            {

                price: "$255",

                category: "postres",

            }, {

                price: "$345",
                description: "Perfectos para acompañar con frutas, chocolate o lo que tu antojo dicte… ¡una delicia belga en tu mesa!",
                category: "postres",
                image: "Belgian Waffles.jpg"
            }, {
                name: "Churros Rellenos de Dulce de Leche",
                price: "$275",
                description: "Deléitate con nuestros churros crujientes por fuera y rellenos con cremoso dulce de leche que se derrite en tu boca.",
                category: "postres",

            }, {
                name: "Brownie de chocolate con nueces",
                price: "$125",
                description: "El brownie de chocolate con nueces es un pastelito suave y denso, con intenso sabor a chocolate.",
                category: "postres",
                image: "Brownie de chocolate con nueces.jpeg"
            }, {
                name: "Galletas de avena",
                price: "$110",
                description: "Las galletas de avena son crujientes por fuera y suaves por dentro, elaboradas con avena natural.",
                category: "postres",
                image: "Galletas de avena.jpeg"
            }, {
                name: "Pastel de chocolate con relleno de fresa",
                price: "$150",
                description: "Pastel de chocolate con relleno de fresa es un delicioso bocadillo con una suave capa de chocolate y un corazón cremoso de fresa.",
                category: "postres",
                image: "PASTEL DE CHOCOLATE CON RELLENO DE FRESA.jpeg"
            }, {
                name: "Cup cakes con fresa",
                price: "$150",
                description: "Cupcakes con fresa esponjosos y delicadamente horneados, decorados con crema y trozos de fresa fresca.",
                category: "postres",
                image: "Cup cakes de fresa.jpeg"
            }, {
                name: "Panna cotta",
                price: "$150",
                description: "Panna cotta es un postre italiano suave y cremoso, elaborado a base de nata endulzada y gelatina. Su textura sedosa se combina perfectamente con frutas o salsas.",
                category: "postres",
                image: "Panna Cotta.jpeg"
            }, {
                name: "Macarons Franceses",
                price: "$135",
                description: "Macarons franceses, galletas de almendra con relleno cremoso en diversos sabores.",
                category: "postres",
                image: "Macarons Franceses.jpeg"
            }
        ];

        // Función para cargar los productos
        function loadProducts(filter = 'all', searchTerm = '') {
            const menuContainer = document.getElementById('menu-container');
            menuContainer.innerHTML = '';

            let filteredProducts = productos;

            // Filtrar por categoría
            if (filter !== 'all') {
                filteredProducts = productos.filter(product => product.category === filter);
            }

            // Filtrar por término de búsqueda
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filteredProducts = filteredProducts.filter(product =>
                    product.name.toLowerCase().includes(term) ||
                    product.description.toLowerCase().includes(term)
                );
            }

            // Agrupar por categoría si se muestran todos
            if (filter === 'all') {
                const categories = {
                    'bebidas-frias': [],
                    'bebidas-calientes': [],
                    'comida': [],
                    'postres': []
                };

                filteredProducts.forEach(product => {
                    categories[product.category].push(product);
                });

                // Mostrar por categorías
                for (const [category, products] of Object.entries(categories)) {
                    if (products.length > 0) {
                        const categoryTitle = document.createElement('h2');
                        categoryTitle.className = 'category-title';

                        // Asignar nombre de categoría legible
                        let categoryName = '';
                        switch (category) {
                            case 'bebidas-frias':
                                categoryName = 'Bebidas Frías';
                                break;
                            case 'bebidas-calientes':
                                categoryName = 'Bebidas Calientes';
                                break;
                            case 'comida':
                                categoryName = 'Comida';
                                break;
                            case 'postres':
                                categoryName = 'Postres';
                                break;
                        }

                        categoryTitle.textContent = categoryName;
                        menuContainer.appendChild(categoryTitle);

                        // Mostrar productos de esta categoría
                        products.forEach(product => {
                            const productElement = document.createElement('div');
                            productElement.className = 'menu-item';
                            productElement.dataset.category = product.category;

                            let badgeHTML = '';
                            if (product.badge) {
                                badgeHTML = `<span class="badge">${product.badge}</span>`;
                            }

                            productElement.innerHTML = `
                                <div class="item-image" style="background-image: url('${product.image}')">
                                    ${badgeHTML}
                                    <img src="${product.image}" alt="${product.name}" style="display:none;" onerror="this.parentElement.style.backgroundImage='none'; this.style.display='block'; this.style.width='100%'; this.style.height='200px'; this.style.objectFit='cover';">
                                </div>
                                <div class="item-info">
                                    <div class="item-header">
                                        <span class="item-name">${product.name}</span>
                                        <span class="item-price">${product.price}</span>
                                    </div>
                                    <p class="item-desc">${product.description}</p>
                                </div>
                            `;

                            menuContainer.appendChild(productElement);
                        });
                    }
                }
            } else {
                // Mostrar productos sin agrupar si se filtró por categoría
                filteredProducts.forEach(product => {
                    const productElement = document.createElement('div');
                    productElement.className = 'menu-item';
                    productElement.dataset.category = product.category;

                    let badgeHTML = '';
                    if (product.badge) {
                        badgeHTML = `<span class="badge">${product.badge}</span>`;
                    }

                    productElement.innerHTML = `
                        <div class="item-image" style="background-image: url('${product.image}')">
                            ${badgeHTML}
                            <img src="${product.image}" alt="${product.name}" style="display:none;" onerror="this.parentElement.style.backgroundImage='none'; this.style.display='block'; this.style.width='100%'; this.style.height='200px'; this.style.objectFit='cover';">
                        </div>
                        <div class="item-info">
                            <div class="item-header">
                                <span class="item-name">${product.name}</span>
                                <span class="item-price">${product.price}</span>
                            </div>
                            <p class="item-desc">${product.description}</p>
                        </div>
                    `;

                    menuContainer.appendChild(productElement);
                });
            }

            // Mostrar mensaje si no hay resultados
            if (filteredProducts.length === 0) {
                menuContainer.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; padding: 2rem;">No se encontraron productos que coincidan con tu búsqueda.</p>';
            }
        }

        // Eventos para los botones de categoría
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                loadProducts(this.dataset.category, document.getElementById('search').value);
            });
        });

        // Evento para la búsqueda
        document.getElementById('search').addEventListener('input', function() {
            const activeCategory = document.querySelector('.category-btn.active').dataset.category;
            loadProducts(activeCategory, this.value);
        });

        // Cargar todos los productos al inicio
        window.addEventListener('DOMContentLoaded', () => loadProducts());
    </script>
</body>

</html>
